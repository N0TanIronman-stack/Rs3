<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drop Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
  --accent: #e94560; --gold: #f5c518; --text: #e0e0e0;
  --dim:    #7a7a9a; --border: #2a2a4a;
  --green:  #4caf50; --blue: #64b5f6; --purple: #ba68c8;
  --orange: #ff9800;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px; height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}
#titlebar, .section-hdr, .drop-row, #status, .npc-item { user-select: none; }

#titlebar {
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  border-bottom: 2px solid var(--accent);
  padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
#titlebar .logo { font-size: 18px; }
#titlebar .titles { flex: 1; }
#titlebar h1 { font-size: 13px; font-weight: 700; color: var(--gold); }
#titlebar .subtitle { font-size: 11px; color: var(--dim); margin-top: 1px; }
#close {
  background: none; border: 1px solid var(--border); color: var(--dim);
  width: 22px; height: 22px; border-radius: 3px; cursor: pointer;
  font-size: 12px; display: flex; align-items: center; justify-content: center;
}
#close:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

#searchbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 7px 10px; display: flex; gap: 5px; flex-shrink: 0;
}
#search-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); padding: 5px 8px;
  font-size: 12px; outline: none; cursor: text;
  user-select: text; -webkit-user-select: text;
}
#search-input:focus { border-color: var(--accent); }
#search-btn {
  background: var(--accent); border: none; border-radius: 4px;
  color: #fff; padding: 5px 12px; cursor: pointer; font-size: 12px; font-weight: 600;
}
#search-btn:hover { opacity: 0.85; }

#status {
  padding: 5px 12px; font-size: 11px; color: var(--dim);
  border-bottom: 1px solid var(--border); min-height: 24px; flex-shrink: 0;
}
#status.ok   { color: var(--green); }
#status.err  { color: var(--accent); }
#status.busy { color: var(--gold); }

#back-btn {
  display: none; background: var(--bg3); border: none; color: var(--dim);
  padding: 4px 10px; font-size: 11px; cursor: pointer;
  border-bottom: 1px solid var(--border); width: 100%; text-align: left; flex-shrink: 0;
}
#back-btn:hover { color: var(--text); }

#content { flex: 1; overflow-y: auto; position: relative; }
#content::-webkit-scrollbar { width: 4px; }
#content::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* ── NPC Browser ── */
#npc-browser { display: flex; flex-direction: column; height: 100%; }
#npc-list-header {
  padding: 5px 12px; font-size: 10px; color: var(--dim);
  border-bottom: 1px solid var(--border); background: var(--bg2);
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
#npc-list { flex: 1; overflow-y: auto; }
#npc-list::-webkit-scrollbar { width: 4px; }
#npc-list::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
.npc-item {
  padding: 7px 12px; border-bottom: 1px solid rgba(42,42,74,0.4);
  cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.1s;
}
.npc-item:hover { background: rgba(233,69,96,0.1); }
.npc-item .npc-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
.npc-item .npc-name { font-size: 12px; color: var(--text); flex: 1; }
.npc-item .npc-cat  { font-size: 10px; color: var(--dim); }
#npc-empty  { padding: 20px; text-align: center; color: var(--dim); font-size: 11px; }
#list-status { padding: 6px 12px; font-size: 10px; color: var(--gold); text-align: center; }

/* ── Disambiguation ── */
#disambig {
  display: none; padding: 12px;
}
#disambig h3 { font-size: 12px; color: var(--gold); margin-bottom: 8px; }
#disambig p  { font-size: 11px; color: var(--dim); margin-bottom: 10px; }
.disambig-option {
  padding: 7px 10px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 4px; margin-bottom: 6px; cursor: pointer; font-size: 12px;
  transition: background 0.1s;
}
.disambig-option:hover { background: var(--bg3); border-color: var(--accent); }

/* ── Drops view ── */
#drops { display: none; }
.section-hdr {
  background: var(--bg3); padding: 5px 12px;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  color: var(--gold); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 1;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
  transition: background 0.15s;
}
.section-hdr:hover { background: #143d6e; }
.section-hdr .hdr-left { display: flex; align-items: center; gap: 6px; }
.section-hdr .chevron {
  font-size: 8px; transition: transform 0.2s; display: inline-block;
  color: var(--dim);
}
.section-hdr.collapsed .chevron { transform: rotate(-90deg); }
.section-hdr .row-count { font-size: 9px; color: var(--dim); font-weight: 400; }
.section-body { overflow: hidden; transition: max-height 0.25s ease; }
.section-body.collapsed { max-height: 0 !important; }
.drop-row {
  display: flex; align-items: center; padding: 4px 10px; gap: 8px;
  border-bottom: 1px solid rgba(42,42,74,0.4); transition: background 0.1s;
}
.drop-row:hover { background: rgba(255,255,255,0.035); }
.item-img {
  width: 28px; height: 28px; flex-shrink: 0;
  object-fit: contain; image-rendering: pixelated;
}
.item-placeholder {
  width: 28px; height: 28px; flex-shrink: 0; background: var(--bg3);
  border-radius: 3px; display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--dim);
}
.item-info { flex: 1; min-width: 0; }
.item-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
.item-qty  { font-size: 10px; color: var(--dim); margin-top: 1px; }
.rarity    { flex-shrink: 0; }
.badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 700; }
.b-always   { background: var(--green); color: #fff; }
.b-common   { border: 1px solid var(--green);  color: var(--green); }
.b-uncommon { border: 1px solid var(--blue);   color: var(--blue); }
.b-rare     { border: 1px solid var(--purple); color: var(--purple); }
.b-vr       { border: 1px solid var(--accent); color: var(--accent); }
.b-ultra    { border: 1px solid var(--orange); color: var(--orange); }
.b-unknown  { border: 1px solid var(--dim);    color: var(--dim); }
</style>
</head>
<body>

<div id="titlebar">
  <span class="logo">📜</span>
  <div class="titles">
    <h1>Drop Viewer</h1>
    <div class="subtitle" id="subtitle">Search any NPC</div>
  </div>
  <button id="close">✕</button>
</div>

<div id="searchbar">
  <input id="search-input" type="text" placeholder="Search NPCs..." autocomplete="off"/>
  <button id="search-btn">Search</button>
</div>

<div id="status"></div>
<button id="back-btn">← Back</button>

<div id="content">
  <div id="npc-browser">
    <div id="npc-list-header">
      <span id="list-label">Loading monster list from wiki...</span>
      <span id="list-count"></span>
    </div>
    <div id="list-status"></div>
    <div id="npc-list"></div>
  </div>

  <div id="disambig">
    <h3>⚠️ Disambiguation</h3>
    <p id="disambig-msg"></p>
    <div id="disambig-options"></div>
  </div>

  <div id="drops"></div>
</div>

<script>
const WIKI = 'https://runescape.wiki/api.php';

// ── State ──────────────────────────────────────────────────
let allMonsters = [];   // full list loaded from SMW
let inDropsView = false;
let searchTimer = null;

// ── Debug ──────────────────────────────────────────────────
function dbg(s) {
  console.log('[DropViewer]', s);
  let overlay = document.getElementById('section-debug');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'section-debug';
    overlay.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#000c;color:#0f0;' +
      'font-family:monospace;font-size:9px;padding:3px;max-height:60px;overflow-y:auto;z-index:999;';
    document.body.appendChild(overlay);
  }
  //overlay.innerHTML += s + '<br>';
  //overlay.scrollTop = overlay.scrollHeight;
}

// ── Status ─────────────────────────────────────────────────
function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = type; el.textContent = msg;
}

// ── View switching ─────────────────────────────────────────
function showBrowser() {
  document.getElementById('npc-browser').style.display = 'flex';
  document.getElementById('disambig').style.display = 'none';
  document.getElementById('drops').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('subtitle').textContent = 'Search any NPC';
  inDropsView = false;
}
function showDisambig() {
  document.getElementById('npc-browser').style.display = 'none';
  document.getElementById('disambig').style.display = 'block';
  document.getElementById('drops').style.display = 'none';
  document.getElementById('back-btn').style.display = 'block';
  inDropsView = false;
}
function showDrops() {
  document.getElementById('npc-browser').style.display = 'none';
  document.getElementById('disambig').style.display = 'none';
  document.getElementById('drops').style.display = 'block';
  document.getElementById('back-btn').style.display = 'block';
  inDropsView = true;
}

// ── Load full monster list from SMW ───────────────────────
// Uses the Semantic MediaWiki API to get all pages with a
// "Monster JSON" property (i.e. all monster pages on the wiki).
async function loadMonsterList() {
  document.getElementById('list-status').textContent = '⏳ Loading monster list...';
  let monsters = [];
  let offset = 0;
  const limit = 500;

  try {
    while (true) {
      const query = `[[Monster JSON::+]]|?Has name|limit=${limit}|offset=${offset}`;
      const url = `${WIKI}?action=ask&query=${encodeURIComponent(query)}&format=json&origin=*`;
      const r = await fetch(url);
      const d = await r.json();
      const results = d?.query?.results;
      if (!results) break;

      const keys = Object.keys(results);
      if (keys.length === 0) break;

      for (const key of keys) {
        const page = results[key];
        const name = page?.printouts?.['Has name']?.[0] || page.fulltext;
        if (name && !name.includes('/')) {  // skip subpages
          monsters.push({ name, fulltext: page.fulltext });
        }
      }

      dbg(`Loaded ${monsters.length} monsters so far (offset ${offset})`);
      document.getElementById('list-status').textContent =
        `⏳ Loading... ${monsters.length} monsters found`;

      if (keys.length < limit) break;
      offset += limit;
    }

    // Deduplicate and sort
    const seen = new Set();
    allMonsters = monsters
      .filter(m => { if (seen.has(m.name)) return false; seen.add(m.name); return true; })
      .sort((a, b) => a.name.localeCompare(b.name));

    dbg(`Final monster count: ${allMonsters.length}`);
    document.getElementById('list-status').textContent = '';
    document.getElementById('list-label').textContent = 'Popular monsters';
    document.getElementById('list-count').textContent = 'Type';//allMonsters.length + ' total';
    renderNpcList('');

  } catch(e) {
    dbg('Monster list load error: ' + e.message);
    document.getElementById('list-status').textContent =
      '⚠️ Could not load full list — use search box above';
    // Fall back to popular list
    allMonsters = POPULAR_NPCS.map(n => ({ name: n.name, fulltext: n.name, cat: n.cat, icon: n.icon }));
    renderNpcList('');
  }
}

// ── Popular NPC fallback list ──────────────────────────────
const POPULAR_NPCS = [
  { name:'Abyssal demon',icon:'👹',cat:'Slayer' },
  { name:'Araxxor',icon:'🕷️',cat:'Boss' },
  { name:'Arch-Glacor',icon:'❄️',cat:'Boss' },
  { name:'Commander Zilyana',icon:'⚔️',cat:'Boss' },
  { name:'Corporeal Beast',icon:'👻',cat:'Boss' },
  { name:'General Graardor',icon:'⚔️',cat:'Boss' },
  { name:'Giant mole',icon:'🐭',cat:'Boss' },
  { name:'Goblin',icon:'👺',cat:'Common' },
  { name:'Greater demon',icon:'😈',cat:'Slayer' },
  { name:'Gregorovic',icon:'⚔️',cat:'Boss' },
  { name:'Helwyr',icon:'🐺',cat:'Boss' },
  { name:"K'ril Tsutsaroth",icon:'😈',cat:'Boss' },
  { name:'Kalphite King',icon:'🦂',cat:'Boss' },
  { name:'Kalphite Queen',icon:'🦂',cat:'Boss' },
  { name:"Kree'arra",icon:'🦅',cat:'Boss' },
  { name:'Nex',icon:'⚔️',cat:'Boss' },
  { name:'Nex: Angel of Death',icon:'💀',cat:'Boss' },
  { name:'Raksha',icon:'🦖',cat:'Boss' },
  { name:'Ripper demon',icon:'👹',cat:'Slayer' },
  { name:'TzTok-Jad',icon:'🔥',cat:'Boss' },
  { name:'TzKal-Zuk',icon:'🔥',cat:'Boss' },
  { name:'Twin Furies',icon:'⚔️',cat:'Boss' },
  { name:'Vindicta',icon:'🐉',cat:'Boss' },
  { name:'Vorkath',icon:'🐉',cat:'Boss' },
];

// ── Render NPC list ────────────────────────────────────────
function renderNpcList(filter) {
  const list = document.getElementById('npc-list');
  const q = filter.toLowerCase().trim();
  const source = allMonsters.length > 0 ? allMonsters : POPULAR_NPCS;

  const filtered = q
    ? source.filter(n => n.name.toLowerCase().includes(q)).slice(0, 100)
    : source.slice(0, 200);

  if (filtered.length === 0) {
    list.innerHTML = `<div id="npc-empty">No matches for "<strong>${filter}</strong>"<br>
      <small>Press Search to look it up directly on the wiki</small></div>`;
    return;
  }

  // Use a document fragment for performance
  const frag = document.createDocumentFragment();
  for (const npc of filtered) {
    const el = document.createElement('div');
    el.className = 'npc-item';
    el.innerHTML = `
      <span class="npc-icon">${npc.icon || '👾'}</span>
      <span class="npc-name">${npc.name}</span>
      ${npc.cat ? `<span class="npc-cat">${npc.cat}</span>` : ''}`;
    el.addEventListener('click', () => lookup(npc.fulltext || npc.name));
    frag.appendChild(el);
  }

  list.innerHTML = '';
  list.appendChild(frag);

  if (q && allMonsters.length > 0 && filtered.length === 100) {
    const more = document.createElement('div');
    more.id = 'npc-empty';
    more.textContent = `Showing first 100 matches — type more to narrow down`;
    list.appendChild(more);
  }
}

// ── Disambiguation detection ───────────────────────────────
async function checkDisambig(title) {
  const url = `${WIKI}?action=query&titles=${encodeURIComponent(title)}&prop=pageprops&ppprop=disambiguation&format=json&origin=*`;
  const r = await fetch(url);
  const d = await r.json();
  const pages = d?.query?.pages;
  if (!pages) return false;
  const page = Object.values(pages)[0];
  // 'disambiguation' key present (even if empty string) means it's a disambig page
  return page?.pageprops?.hasOwnProperty('disambiguation') ?? false;
}

async function getDisambigLinks(title) {
  // Get all links on the disambiguation page
  const url = `${WIKI}?action=parse&page=${encodeURIComponent(title)}&prop=links&format=json&origin=*`;
  const r = await fetch(url);
  const d = await r.json();
  return (d?.parse?.links || [])
    .filter(l => l.ns === 0)  // main namespace only
    .map(l => l['*'])
    .filter(l => !l.includes('disambiguation') && !l.includes('(disambiguation)'));
}

function showDisambigOptions(title, links) {
  document.getElementById('disambig-msg').textContent =
    `"${title}" refers to multiple pages. Which one are you looking for?`;
  const container = document.getElementById('disambig-options');
  container.innerHTML = '';
  for (const link of links) {
    const el = document.createElement('div');
    el.className = 'disambig-option';
    el.textContent = link;
    el.addEventListener('click', () => lookupPage(link));
    container.appendChild(el);
  }
  showDisambig();
  document.getElementById('subtitle').textContent = 'Choose a page';
  setStatus('', '');
}

// ── Icon URL fixer ─────────────────────────────────────────
function fixIconUrl(src) {
  if (!src) return '';
  let url = src;
  if (url.startsWith('/')) url = 'https://runescape.wiki' + url;
  url = url.replace(/\/thumb\//, '/').replace(/\/\d+px-[^/]+$/, '');
  return url;
}

// ── Rarity classifier ──────────────────────────────────────
function rarityClass(r) {
  if (!r) return { label: '?', cls: 'b-unknown' };
  const s = r.toLowerCase().trim();
  if (s === 'always') return { label: 'Always', cls: 'b-always' };
  const m = s.match(/(\d[\d,.]*)\/(\d[\d,.]*)/);
  if (m) {
    const chance = parseFloat(m[1].replace(/,/g,'')) / parseFloat(m[2].replace(/,/g,''));
    const label = r.split(/[;(]/)[0].trim();
    if (chance >= 0.25)   return { label, cls: 'b-common' };
    if (chance >= 0.03)   return { label, cls: 'b-uncommon' };
    if (chance >= 0.003)  return { label, cls: 'b-rare' };
    if (chance >= 0.0003) return { label, cls: 'b-vr' };
    return                       { label, cls: 'b-ultra' };
  }
  if (s.includes('very rare')||s.includes('ultra')) return { label:r, cls:'b-vr' };
  if (s.includes('rare'))     return { label:r, cls:'b-rare' };
  if (s.includes('uncommon')) return { label:r, cls:'b-uncommon' };
  if (s.includes('common'))   return { label:r, cls:'b-common' };
  return { label:r, cls:'b-unknown' };
}

// ── Main lookup ────────────────────────────────────────────
async function lookup(name) {
  if (!name) return;
  setStatus('busy', `🔍 Searching for "${name}"...`);
  showDrops();
  document.getElementById('subtitle').textContent = name;
  document.getElementById('search-input').value = name;
  document.getElementById('drops').innerHTML = '';

  // 1. OpenSearch to get best title match
  let title = null;
  try {
    const r = await fetch(`${WIKI}?action=opensearch&search=${encodeURIComponent(name)}&limit=5&format=json&origin=*`);
    const d = await r.json();
    if (d[1]?.length) title = d[1][0];
  } catch(e) {
    setStatus('err', '❌ Network error: ' + e.message);
    return;
  }
  if (!title) { setStatus('err', `⚠️ "${name}" not found on the RS Wiki.`); return; }

  await lookupPage(title);
}

async function lookupPage(title) {
  setStatus('busy', `📄 Loading: ${title}...`);
  document.getElementById('subtitle').textContent = title;

  // 2. Check for disambiguation
  try {
    const isDisambig = await checkDisambig(title);
    if (isDisambig) {
      dbg(title + ' is a disambiguation page');
      setStatus('busy', `🔀 "${title}" is a disambiguation page...`);
      const links = await getDisambigLinks(title);
      dbg('Disambig links: ' + links.join(', '));
      showDisambigOptions(title, links);
      return;
    }
  } catch(e) {
    dbg('Disambig check error: ' + e.message);
    // Continue anyway
  }

  // 3. Fetch page HTML
  let html = '';
  try {
    const r = await fetch(`${WIKI}?action=parse&page=${encodeURIComponent(title)}&prop=text&format=json&origin=*`);
    const d = await r.json();
    html = d?.parse?.text?.['*'] || '';
  } catch(e) {
    setStatus('err', '❌ Failed to load wiki page: ' + e.message); return;
  }
  if (!html) { setStatus('err', '❌ Empty page.'); return; }

  // 4. Extract drops
  const sections = extractDrops(html);
  const total = sections.reduce((s,sec) => s + sec.rows.length, 0);

  if (total === 0) {
    setStatus('err', `⚠️ No drop table found for "${title}".`);
    return;
  }

  setStatus('ok', `✅ ${total} drops for ${title}`);
  showDrops();
  renderSections(sections);
}

// ── Drop table parser ──────────────────────────────────────
function extractDrops(rawHtml) {
  const div = document.createElement('div');
  div.innerHTML = rawHtml;

  // Find the Drops heading
  let startEl = null;
  for (const span of div.querySelectorAll('span[id]')) {
    if (span.id.startsWith('Drops')) { startEl = span.closest('h2,h3,h4'); break; }
  }
  if (!startEl) {
    for (const h of div.querySelectorAll('h2,h3,h4')) {
      if (h.textContent.includes('Drop')) { startEl = h; break; }
    }
  }
  if (!startEl) return [];

  const startLevel = parseInt(startEl.tagName[1]);

  // Walk the entire DOM in document order using a TreeWalker.
  // This correctly finds h3/h4 and table elements regardless of nesting depth,
  // in the exact order they appear on the page.
  const walker = document.createTreeWalker(
    div,
    NodeFilter.SHOW_ELEMENT,
    {
      acceptNode(node) {
        const t = node.tagName.toLowerCase();
        // Accept headings and tables — skip everything else
        if (t === 'h2' || t === 'h3' || t === 'h4' || t === 'table') {
          return NodeFilter.FILTER_ACCEPT;
        }
        // Skip into children of other elements
        return NodeFilter.FILTER_SKIP;
      }
    }
  );

  // Advance walker to startEl
  let node = walker.nextNode();
  while (node && node !== startEl) node = walker.nextNode();

  // Now collect everything after startEl
  const sections = [];
  let sectionName = 'Drops';
  let h3count = 0;

  node = walker.nextNode();
  while (node) {
    const tag = node.tagName.toLowerCase();
    const level = parseInt(tag[1]);

    // Stop at same-level or higher heading (e.g. next h2 section)
    if ((tag === 'h2' || tag === 'h3' || tag === 'h4') && level <= startLevel) break;

    if (tag === 'h3' || tag === 'h4') {
      sectionName = node.textContent.replace(/\[.*?\]/g, '').trim();
      h3count++;
      dbg('Heading: "' + sectionName + '" (' + tag + ')');
    }

    if (tag === 'table') {
      const rows = parseTable(node);
      if (rows.length > 0) {
        const existing = sections.find(s => s.name === sectionName);
        if (existing) existing.rows.push(...rows);
        else sections.push({ name: sectionName, rows });
      }
    }

    node = walker.nextNode();
  }

  dbg('Subheadings: ' + h3count + ', sections: ' + sections.length);
  return sections;
}

function parseTable(table) {
  const rows = [];
  for (const tr of table.querySelectorAll('tr')) {
    const tds = Array.from(tr.querySelectorAll('td'));
    if (tds.length < 2) continue;
    let name='', qty='', rarity='', img='';
    for (const td of tds) {
      const text = td.textContent.trim();
      if (!img) {
        const i = td.querySelector('img');
        if (i) img = fixIconUrl(i.getAttribute('src') || i.src || '');
      }
      if (!name && td.querySelector('a')) {
        const a = td.querySelector('a');
        const c = a.textContent.trim();
        if (c.length > 1 && c.length < 80 && !c.match(/^\d+$/)) name = c;
      }
      if (!qty && /^\d[\d,–\-\s]*$/.test(text) && text.length < 20) qty = text;
      if (!rarity && /^(always|\d[\d,]*\s*\/\s*[\d,]+)/i.test(text)) {
        rarity = text.split(';')[0].trim();
      }
    }
    if (!name || name.length > 80) continue;
    if (name.toLowerCase()==='item'||name.toLowerCase()==='items') continue;
    rows.push({ name, qty, rarity, img });
  }
  return rows;
}

// ── Render drops ───────────────────────────────────────────
function renderSections(sections) {
  const container = document.getElementById('drops');
  container.innerHTML = '';

  for (const sec of sections) {
    if (sec.rows.length === 0) continue;

    // Section wrapper
    const wrapper = document.createElement('div');
    wrapper.className = 'section-wrapper';

    // Header (clickable)
    const hdr = document.createElement('div');
    hdr.className = 'section-hdr';
    hdr.innerHTML = `
      <span class="hdr-left">
        <span class="chevron">▼</span>
        <span>${sec.name}</span>
      </span>
      <span class="row-count">${sec.rows.length} items</span>`;

    // Body
    const body = document.createElement('div');
    body.className = 'section-body';

    // Populate rows
    for (const row of sec.rows) {
      body.appendChild(makeDropRow(row));
    }

    // Set initial max-height for animation
    // We set it after append so the browser knows the height
    requestAnimationFrame(() => {
      body.style.maxHeight = body.scrollHeight + 'px';
    });

    // Toggle on click
    hdr.addEventListener('click', () => {
      const collapsed = hdr.classList.toggle('collapsed');
      if (collapsed) {
        body.style.maxHeight = body.scrollHeight + 'px'; // set explicit before collapsing
        requestAnimationFrame(() => body.classList.add('collapsed'));
      } else {
        body.classList.remove('collapsed');
        body.style.maxHeight = body.scrollHeight + 'px';
        // After transition, remove fixed height so it can grow
        body.addEventListener('transitionend', () => {
          if (!hdr.classList.contains('collapsed')) body.style.maxHeight = 'none';
        }, { once: true });
      }
    });

    wrapper.appendChild(hdr);
    wrapper.appendChild(body);
    container.appendChild(wrapper);
  }
}

function makeDropRow(row) {
  const el = document.createElement('div');
  el.className = 'drop-row';
  if (row.img) {
    const img = document.createElement('img');
    img.className = 'item-img'; img.src = row.img; img.alt = row.name;
    img.onerror = function() { this.replaceWith(placeholder(row.name)); };
    el.appendChild(img);
  } else { el.appendChild(placeholder(row.name)); }
  const info = document.createElement('div'); info.className = 'item-info';
  const nm = document.createElement('div'); nm.className = 'item-name'; nm.textContent = row.name;
  info.appendChild(nm);
  if (row.qty) {
    const q = document.createElement('div'); q.className = 'item-qty'; q.textContent = 'x' + row.qty;
    info.appendChild(q);
  }
  el.appendChild(info);
  if (row.rarity) {
    const { label, cls } = rarityClass(row.rarity);
    const wrap = document.createElement('div'); wrap.className = 'rarity';
    const badge = document.createElement('span'); badge.className = 'badge ' + cls; badge.textContent = label;
    wrap.appendChild(badge); el.appendChild(wrap);
  }
  return el;
}

function placeholder(name) {
  const d = document.createElement('div'); d.className = 'item-placeholder';
  d.textContent = (name||'?').charAt(0).toUpperCase(); return d;
}

// ── UI events ──────────────────────────────────────────────
const searchInput = document.getElementById('search-input');

searchInput.addEventListener('input', () => {
  if (inDropsView) return;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => renderNpcList(searchInput.value), 150);
});

document.getElementById('search-btn').addEventListener('click', () => {
  const v = searchInput.value.trim(); if (v) lookup(v);
});
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { const v = searchInput.value.trim(); if (v) lookup(v); }
});
document.getElementById('back-btn').addEventListener('click', () => {
  showBrowser(); renderNpcList(searchInput.value); setStatus('', '');
});
document.getElementById('close').addEventListener('click', () => {
  fetch('https://bolt-api/close', { method:'POST' }).catch(()=>{});
});

// ── Message handler (from Lua) ─────────────────────────────
function handleMsg(text) {
  if (text.startsWith('LOOKUP:')) lookup(text.slice(7));
  else if (text === 'FOCUS_SEARCH') {
    searchInput.value = ''; searchInput.focus();
    if (inDropsView) { showBrowser(); renderNpcList(''); }
  }
}
window.addEventListener('message', evt => {
  if (!evt.data) return;
  if (evt.data.type === 'pluginMessage' && evt.data.content) {
    handleMsg(new TextDecoder().decode(new Uint8Array(evt.data.content)).trim());
  } else if (typeof evt.data === 'string') {
    handleMsg(evt.data.trim());
  }
});

// ── Init ───────────────────────────────────────────────────
showBrowser();
searchInput.focus();
loadMonsterList();  // async load full monster list in background
</script>
